# ── Visibility ────────────────────────────────────────────────────────────────

[[manager.prepend_keymap]]
on   = "."
run  = "hidden toggle"
desc = "Toggle hidden files"

# ── Quick directory navigation ─────────────────────────────────────────────────

[[manager.prepend_keymap]]
on   = ["g", "d"]
run  = "cd ~/Downloads"
desc = "→ ~/Downloads"

[[manager.prepend_keymap]]
on   = ["g", "D"]
run  = "cd ~/Documents"
desc = "→ ~/Documents"

[[manager.prepend_keymap]]
on   = ["g", "p"]
run  = "cd ~/Pictures"
desc = "→ ~/Pictures"

[[manager.prepend_keymap]]
on   = ["g", "V"]
run  = "cd ~/Videos"
desc = "→ ~/Videos"

[[manager.prepend_keymap]]
on   = ["g", "M"]
run  = "cd ~/Music"
desc = "→ ~/Music"

[[manager.prepend_keymap]]
on   = ["g", "C"]
run  = "cd ~/.config"
desc = "→ ~/.config"

[[manager.prepend_keymap]]
on   = ["g", "T"]
run  = "cd ~/.local/share/Trash/files"
desc = "→ Trash"

# ── Copy path to clipboard (wl-clipboard) ─────────────────────────────────────

[[manager.prepend_keymap]]
on   = ["y", "p"]
run  = "shell 'wl-copy \"$1\"'"
desc = "Copy absolute path"

[[manager.prepend_keymap]]
on   = ["y", "d"]
run  = "shell 'wl-copy \"$(dirname \"$1\")\"'"
desc = "Copy directory path"

[[manager.prepend_keymap]]
on   = ["y", "f"]
run  = "shell 'wl-copy \"$(basename \"$1\")\"'"
desc = "Copy filename"

# ── Terminal ───────────────────────────────────────────────────────────────────

[[manager.prepend_keymap]]
on   = "<C-t>"
run  = "shell 'kitty &' --orphan"
desc = "Open kitty terminal in cwd"

# ── Archive extraction ─────────────────────────────────────────────────────────

[[manager.prepend_keymap]]
on   = "X"
run  = "shell 'bsdtar xf \"$1\"' --block --confirm"
desc = "Extract archive in current directory"

# ── Linemode ───────────────────────────────────────────────────────────────────

[[manager.prepend_keymap]]
on   = ["L", "s"]
run  = "linemode size"
desc = "Linemode: file size"

[[manager.prepend_keymap]]
on   = ["L", "m"]
run  = "linemode mtime"
desc = "Linemode: modification time"

[[manager.prepend_keymap]]
on   = ["L", "p"]
run  = "linemode permissions"
desc = "Linemode: rwx permissions"

[[manager.prepend_keymap]]
on   = ["L", "n"]
run  = "linemode none"
desc = "Linemode: off"

# ── Tasks panel ────────────────────────────────────────────────────────────────

[[manager.prepend_keymap]]
on   = "T"
run  = "tasks_show"
desc = "Background tasks panel"
